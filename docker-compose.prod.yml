services:

  # ── Database ────────────────────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    restart: always
    environment:
      POSTGRES_DB: kelvex
      POSTGRES_USER: kelvex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kelvex"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Database backups (nightly pg_dump + retention + optional off-site) ───
  backup:
    image: timescale/timescaledb:latest-pg16
    restart: always
    environment:
      PGHOST: db
      PGUSER: kelvex
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: kelvex
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      # Set to an rclone remote (e.g. "b2:kelvex-backups/db") and mount an
      # rclone.conf to enable off-site copies. Local-only until then.
      BACKUP_RCLONE_REMOTE: ${BACKUP_RCLONE_REMOTE:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backups:/backups
      - ./backend/scripts:/scripts:ro
      - ${RCLONE_CONFIG_PATH:-/dev/null}:/root/.config/rclone/rclone.conf:ro
    entrypoint: ["sh", "/scripts/backup.sh"]

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://kelvex:${POSTGRES_PASSWORD}@db:5432/kelvex
      DATABASE_URL_SYNC: postgresql://kelvex:${POSTGRES_PASSWORD}@db:5432/kelvex
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      OPENEI_API_KEY: ${OPENEI_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Tighten rate limits in prod
      AUTH_RATE_LIMIT_PER_MINUTE: ${AUTH_RATE_LIMIT_PER_MINUTE:-5}
      API_RATE_LIMIT_PER_MINUTE: ${API_RATE_LIMIT_PER_MINUTE:-100}
      AGENT_RATE_LIMIT_PER_MINUTE: ${AGENT_RATE_LIMIT_PER_MINUTE:-600}
      # Pool budget: 4 workers × (5+5) = 40 conns, under PG max_connections
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-5}
      # Invite-only registration
      REGISTRATION_OPEN: "false"
      INVITE_SECRET: ${INVITE_SECRET}
      # Email (alerts, invites, password resets)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-alerts@kelvex.io}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - documents_data:/data/documents
    expose:
      - "8000"
    command: >
      gunicorn app.main:app
        --worker-class uvicorn.workers.UvicornWorker
        --workers 4
        --bind 0.0.0.0:8000
        --timeout 120
        --graceful-timeout 30
        --keep-alive 5
        --access-logfile -
        --error-logfile -
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery worker + beat (leak detection & forecasting batches) ──────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://kelvex:${POSTGRES_PASSWORD}@db:5432/kelvex
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      CORS_ORIGINS: ${CORS_ORIGINS}
      INVITE_SECRET: ${INVITE_SECRET}
      # The worker sends the daily ops digest
      OPS_ALERT_EMAIL: ${OPS_ALERT_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-alerts@kelvex.io}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://kelvex:${POSTGRES_PASSWORD}@db:5432/kelvex
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      CORS_ORIGINS: ${CORS_ORIGINS}
      INVITE_SECRET: ${INVITE_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=info

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    expose:
      - "80"
    depends_on:
      - backend

  # ── Nginx reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

  # ── Certbot (SSL) ────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Run manually: docker compose run certbot certonly --webroot ...
    profiles: ["certbot"]

volumes:
  pg_data:
  redis_data:
  documents_data:
  backups:
  certbot_www:
  certbot_conf:
