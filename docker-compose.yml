version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coldgrid-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-coldgrid}:${POSTGRES_PASSWORD:-coldgrid_dev}@db:5432/${POSTGRES_DB:-coldgrid}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-}
      - OPENEI_API_KEY=${OPENEI_API_KEY:-}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - UVICORN_RELOAD=${UVICORN_RELOAD:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:80,http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: bash start.sh
    restart: unless-stopped
    volumes:
      - documents_data:/data/documents

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coldgrid-worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-coldgrid}:${POSTGRES_PASSWORD:-coldgrid_dev}@db:5432/${POSTGRES_DB:-coldgrid}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coldgrid-beat
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-coldgrid}:${POSTGRES_PASSWORD:-coldgrid_dev}@db:5432/${POSTGRES_DB:-coldgrid}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped

  db:
    image: timescale/timescaledb:latest-pg16
    container_name: coldgrid-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-coldgrid}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-coldgrid_dev}
      - POSTGRES_DB=${POSTGRES_DB:-coldgrid}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldgrid"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backup:
    image: timescale/timescaledb:latest-pg16
    container_name: coldgrid-backup
    environment:
      - PGHOST=db
      - PGUSER=${POSTGRES_USER:-coldgrid}
      - PGPASSWORD=${POSTGRES_PASSWORD:-coldgrid_dev}
      - PGDATABASE=${POSTGRES_DB:-coldgrid}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-14}
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-86400}
      - BACKUP_RCLONE_REMOTE=${BACKUP_RCLONE_REMOTE:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backups:/backups
      - ./backend/scripts:/scripts:ro
    entrypoint: ["sh", "/scripts/backup.sh"]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: coldgrid-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coldgrid-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  documents_data:
  backups:
