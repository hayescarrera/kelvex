[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
addopts =
    --cov=app
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    # Ratcheted down from 48 on 2026-07-09: energy_analytics/polling/digest
    # services landed untested and diluted coverage. Raise back as tests land;
    # never lower without writing down why.
    --cov-fail-under=45
